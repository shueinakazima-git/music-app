services:
  app:
    build:
      context: .
    container_name: music-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_USER: ${PG_USER:-musicuser}
      PG_PASSWORD: ${PG_PASSWORD:-password}
      PG_HOST: db
      PG_PORT: 5432
      PORT: ${PORT:-3000}
      PG_DATABASE: ${PG_DATABASE:-musicdb}
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: music-db
    environment:
      POSTGRES_USER: ${PG_USER:-musicuser}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-password}
      POSTGRES_DB: ${PG_DATABASE:-musicdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./query/create_table_postgres.sql:/docker-entrypoint-initdb.d/01-create_table.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-musicuser} -d
${PG_DATABASE:-musicdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:

